<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="../images/vote.jpg" type="image/jpeg" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <title>Home</title>
  </head>

  <body class="admin">
    <header class="flex justify-between items-center mx-6 mb-20">
      <h1
        class="text-slate-950 text-2xl font-extrabold text-center justify-center"
      >
        VoteSphere
      </h1>
      <img
        id="sidebarToggle"
        class="w-12 h-12 cursor-pointer shadow-lg"
        src="../images/group.jpg"
        alt=""
      />
    </header>

    <div
      id="sidebar"
      class="hidden fixed top-0 right-0 h-full w-64 bg-gray-800 text-white"
    >
      <img
        id="cancelToggle"
        class="w-16 h-16 cursor-pointer shadow-lg ml-auto"
        src="../images/cancel-3.png"
        alt=""
      />
      <button
        class="hidden block w-full text-left p-2 mb-2 hover:bg-gray-700"
        id="membersButton"
      >
        Members
      </button>
      <button class="block sign-out w-full text-left p-2 hover:bg-gray-700">
        Sign Out
      </button>
    </div>

    <main class="max-w-5xl min-h-screen mx-auto p-5">
      <p class="w-full mb-12 text-center">
        <span class="text-lg text-slate-950">VoteSphere</span> aims to make fair
        votes where members can vote on their choices while their rights are
        respected.
      </p>
      <div class="flex flex-col shadow-sm rounded-lg px-5 py-2 my-poll">
        <div class="w-full flex justify-between items-center mb-3 text-center">
          <h2 class="hidden text-lg font-semibold mx-auto all-polls">
            My Polls
          </h2>
        </div>
        <p class="hidden no text-center text-gray-500 mt-6">No Polls Yet</p>
        <div id="myPollsContainer"></div>
        <p class="hidden text-xs text-red-500" id="member-del">
          As a member, You can not delete the pole
        </p>
        <button
          id="createPollBtn"
          class="hidden bg-blue-900 p-2 rounded-md text-white block mt-16 w-1/6 mx-auto"
        >
          Create Poll
        </button>
      </div>
      <h2 id="nogrp" class="text-center text-xl">
        You Dont Have Any Group Yet
      </h2>
      <form
        id="new-admin"
        class="hidden w-1/2 mx-auto border mt-10 p-6 creategrp"
        onsubmit="return false"
        action="/"
        method="post"
      >
        <div class="mb-8">
          <label class="text-indigo-950 text-lg group-name" for=""
            >Enter Group Name:</label
          >
          <input
            id="group-name"
            class="focus:opacity-50 border p-2 mx-4 group"
            type="text"
            name="group"
            id="group"
            required
          />
        </div>

        <button
          class="cursor-pointer w-3/4 mt-4 block mx-auto text-sm border rounded-md p-2 bg-blue-900 text-white creategrp"
          type="submit"
          value="create"
          name=""
          id=""
          required
        >
          Create Group
        </button>
      </form>
    </main>

    <script src="../scripts/home.js"></script>
  </body>
</html>
