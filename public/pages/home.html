<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="./admin.css">
</head>

<body class="admin">
    <title>Admin</title>

    <header class="flex justify-between items-center mx-6 mb-20 mt-4">
        <h1 class="text-slate-950 text-2xl font-extrabold text-center justify-center">VoteSphere</h1>
        <img id="sidebarToggle" class="w-16 h-16 cursor-pointer shadow-lg" src="../Admin/images/group.jpg" alt="">
    </header>

    <div id="sidebar" class="hidden fixed top-0 right-0 h-full h-96 w-64 bg-gray-800 text-white p-4 z-50">
        <img id="cancelToggle" class="w-16 h-16 cursor-pointer shadow-lg ml-auto" src="../Admin/images/cancel-3.png" alt="">
        <button class="block w-full text-left p-2 mb-2 hover:bg-gray-700">Members</button>
        <button class="block w-full text-left p-2 hover:bg-gray-700">Sign Out</button>
    </div>

    <main class="lg:w-5xl h-screen lg:mx-12 p-5 md:w-4/6 md:mx-6 h-screen sm:w-2/6 ">
        <p class="w-1/2 mb-12"><span class="text-lg text-slate-950">VoteSphere</span> aims to make fair votes where
            members can vote on their choices while their rights are respected.</p>
        <div class="flex flex-col shadow-sm rounded-lg px-5 py-2 my-poll">
            <div class="w-full flex justify-between items-center mb-3 text-center ">
                <h2 class="text-lg font-semibold mx-auto">My Polls</h2>
            </div>
            <div id="myPollsContainer"></div>
            <a href="pole.html">
                <button class="bg-blue-900 p-2 rounded-md text-white block mx-auto mt-16">Create Pole</button>
            </a>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }

        document.getElementById('sidebarToggle').addEventListener('click', function () {
            toggleSidebar();
        });

        document.getElementById('cancelToggle').addEventListener('click', function () {
            toggleSidebar();
        });

        function toggleAccordion(accordionId, button) {
            var accordion = document.getElementById(accordionId);
            accordion.classList.toggle('hidden');
            var isOpen = !accordion.classList.contains('hidden');
            button.setAttribute('flex', isOpen);
        }

        function deletePoll(pollIndex) {
            var existingPolls = JSON.parse(localStorage.getItem('myPolls')) || [];
            existingPolls.splice(pollIndex, 1);
            localStorage.setItem('myPolls', JSON.stringify(existingPolls));
            loadMyPolls();
        }

        function loadMyPolls() {
            var myPollsContainer = document.getElementById('myPollsContainer');
            myPollsContainer.innerHTML = '';

            var existingPolls = JSON.parse(localStorage.getItem('myPolls')) || [];

            if (existingPolls.length === 0) {
                myPollsContainer.innerHTML = '<p class="text-center text-gray-500 mt-6">No Polls Yet</p>';
                return;
            }

            existingPolls.forEach(function (poll, pollIndex) {
                var mainContainer = document.createElement('div');
                mainContainer.className = 'mb-5';

                var accordionItem = document.createElement('div');
                accordionItem.className =
                    'border py-1 flex flex-col items-center pr-5 pl-10 w-full justify-between rounded shadow-sm acordion';
                accordionItem.innerHTML = `
                <div class="w-full flex justify-between items-center">
                    <p class="w-full text-center">${poll.question}</p>
                    <div class="flex gap-3">
                        <button class="text-left font-semibold" onclick="toggleAccordion('item${pollIndex}', this)">
                            <img class="w-7" src="../Admin/images/download.jpg" alt="">
                        </button>
                        <button class="w-12 h-12 object-contain rounded-full overflow-hidden flex ml-auto p-2"
                            onclick="deletePoll(${pollIndex})">
                            <img src="../Admin/images/delete-but.png" alt="delete"
                                class="object-contain w-full h-full">
                        </button>
                    </div>
                </div>`;

                var choices = document.createElement('div');
                choices.id = `item${pollIndex}`;
                choices.className = 'py-2 px-4 w-full hidden';

                if (poll.choices.length > 0) {
                    poll.choices.forEach(function (choice, choiceIndex) {
                        choices.innerHTML +=
                            `<div class="flex gap-1 align-center w-full pl-10 shadow-sm rounded-lg pb-5 mt-3">
                                <div class="flex w-3/6">
                                    <input type="radio" name="item${pollIndex}" class="mr-2" id="choice${pollIndex}-${choiceIndex}" onclick="vote('${pollIndex}', '${choiceIndex}')">
                                    <label class="ml" for="">
                                        <p class="ml-8 inline-block">${choice}</p>
                                        <div id="progressBar${pollIndex}-${choiceIndex}" class="progress-bar w-1/2 bg-blue-500 h-2 rounded-full mt-1 ml-6"></div>
                                    </label>
                                </div>
                            </div>`;
                    });
                }

                mainContainer.appendChild(accordionItem);
                mainContainer.appendChild(choices);
                myPollsContainer.appendChild(mainContainer);
            });
        }

        function vote(pollIndex, choiceIndex) {
            var radios = document.getElementsByName(`item${pollIndex}`);
            
            radios.forEach(radio => {
                radio.disabled = true;
            });

            var progressBarId = `progressBar${pollIndex}-${choiceIndex}`;
            var progressBar = document.getElementById(progressBarId);

            var totalVotes = 100;
            var choiceVotes = 30;

            if (totalVotes > 0) {
                var percentage = (choiceVotes / totalVotes) * 100;
                progressBar.style.width = percentage + '%';
            } else {

                progressBar.style.width = '0%';
            }
        }

        loadMyPolls();
    </script>
</body>

</html>
