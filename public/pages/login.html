<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign Up</title>
</head>
<body>
    <div class="h-screen flex justify-center items-center">
        <section class="w-full px-4 sm:w-1/2 mx-4 md:w-1/3 md:px-4 lg:w-1/3  py-10 md:mx-auto border rounded-md">
            <img src="images/vote.jpg" class="bloack mx-auto w-24 h-24" alt="">
            <h2 class="text-indigo-950 text-center text-lg font-bold">VoteSphere</h2>
            
            <p class="text-sm text-center mt-10">Empowering Voices, Ensuring Fairness in Every Poll.</p>
            <p class="text-sm text-center mb-6"> Welcome to VoteSphere.</p>
            <form action="/login" method="post">
                <input class="text-sm border w-3/4 rounded-sm p-2 mx-auto block mt-3 mb-4" type="text" name="name" placeholder="Enter Username" id="">
                <p class="text-sm pl-11 text-red-500 hidden">Username not found</p>
                <input class="text-sm border w-3/4 rounded-sm p-2 mx-auto block mb-8" type="password" name="password" placeholder="Enter Password" id="">
                <p class="text-sm pl-11 text-red-500 hidden">Username not found</p>
                <input class="w-3/4 mt-4 block mx-auto text-sm border rounded-md p-2 bg-blue-900 text-white" type="submit" value="Login" name="" id="">
                
                
                <div class="text-right mr-10 mt-10">
                    <label for="">Don't have an account?</label>
                    <a class="text-sm text-blue-600 underline" href="signup.html">Sign up</a>
                </div>
                
            </form>
        </section>
    </div>
       
    
</body>
</html>
